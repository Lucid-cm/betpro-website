<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | BetPro</title>
    <meta name="description" content="Create your BetPro account and start copying top bets from professional players today." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="auth-header">
      <a href="index.html" class="auth-back">← Back to Home</a>
      <a href="login.html" class="btn-login">Sign In</a>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <a href="index.html" class="auth-logo">
          <div class="logo-icon">◆</div>
          <span class="auth-logo-text">BetPro</span>
        </a>

        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join 50K+ players already earning on BetPro</p>

        <!-- Social Signup -->
        <div class="social-btns">
          <button type="button" class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>

        <div class="social-divider"><span>or create with email</span></div>

        <form id="signupForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="fullname">Full name <span class="required">*</span></label>
            <input type="text" id="fullname" class="form-input" placeholder="John Smith" required autocomplete="name" />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email address <span class="required">*</span></label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password <span class="required">*</span></label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Create a strong password"
                required
                autocomplete="new-password"
                oninput="updateStrength(this.value)"
              />
              <button type="button" class="input-toggle" onclick="togglePwd('password', this)" aria-label="Toggle password">👁</button>
            </div>
            <div class="password-strength">
              <div class="strength-bar" id="s1"></div>
              <div class="strength-bar" id="s2"></div>
              <div class="strength-bar" id="s3"></div>
              <div class="strength-bar" id="s4"></div>
            </div>
            <p class="hint-text" id="strengthLabel">Use 8+ characters with letters, numbers &amp; symbols.</p>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm password <span class="required">*</span></label>
            <div class="input-wrapper">
              <input
                type="password"
                id="confirmPassword"
                class="form-input"
                placeholder="Re-enter your password"
                required
                autocomplete="new-password"
              />
              <button type="button" class="input-toggle" onclick="togglePwd('confirmPassword', this)" aria-label="Toggle confirm">👁</button>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 24px;">
            <label class="form-check">
              <input type="checkbox" id="terms" required />
              I agree to the <a href="#" class="form-link">Terms of Service</a> and <a href="#" class="form-link">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn-auth">Create Account — It's Free 🚀</button>
        </form>

        <p class="auth-footer-text">
          Already have an account?
          <a href="login.html" class="form-link">Sign In</a>
        </p>
      </div>
    </main>

    <script>
      function togglePwd(id, btn) {
        const input = document.getElementById(id);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.textContent = isHidden ? '🙈' : '👁';
      }

      function updateStrength(val) {
        const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
        const label = document.getElementById('strengthLabel');
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const colors = ['#ef4444','#f97316','#fbbf24','#10b981'];
        const labels = ['Too weak','Weak','Fair','Strong — great!'];

        bars.forEach((bar, i) => {
          bar.style.background = i < score ? colors[score - 1] : 'rgba(255,255,255,0.07)';
          bar.style.boxShadow = i < score ? `0 0 8px ${colors[score-1]}60` : 'none';
          bar.style.transition = 'background 0.4s ease, box-shadow 0.4s ease';
        });

        if (val.length === 0) {
          label.textContent = 'Use 8+ characters with letters, numbers & symbols.';
          label.style.color = '';
        } else {
          label.textContent = labels[score - 1] || labels[0];
          label.style.color = colors[score - 1] || colors[0];
        }
      }

      document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name  = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim();
        const pwd   = document.getElementById('password').value;
        const cpwd  = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;
        const btn   = this.querySelector('.btn-auth');

        let errors = [];
        if (!name || !email || !pwd || !cpwd) errors.push('Please fill in all required fields.');
        else if (pwd !== cpwd) errors.push('Passwords do not match.');
        else if (pwd.length < 8) errors.push('Password must be at least 8 characters.');
        else if (!terms) errors.push('Please accept the Terms of Service to continue.');

        if (errors.length) { showError(errors[0]); return; }

        btn.innerHTML = '<span style="animation:spin 0.8s linear infinite;display:inline-block">⟳</span> Creating your account...';
        btn.disabled = true;

        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1400);
      });

      function showError(msg) {
        let err = document.querySelector('.form-error');
        if (!err) {
          err = document.createElement('p');
          err.className = 'form-error';
          err.style.cssText = 'color:#ef4444;font-size:13px;font-weight:600;margin-bottom:12px;text-align:center;padding:10px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;';
          document.querySelector('.btn-auth').before(err);
        }
        err.textContent = msg;
        err.style.animation = 'shake 0.4s ease';
        setTimeout(() => err.style.animation = '', 400);
      }
    </script>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes shake {
        0%,100% { transform: translateX(0); }
        20%,60%  { transform: translateX(-6px); }
        40%,80%  { transform: translateX(6px); }
      }
    </style>
  </body>
</html>
