<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>otp page</title>
    <link rel="stylesheet" href="css/styles.css" />
    <meta
      name="description"
      content="Sign in to your BetPro account and start copying top bets from professional players."
    />
  </head>
  <body>
    <header class="auth-header">
      <a href="index.html" class="auth-back">&#8592; Back to Home</a>
    </header>
    <main class="auth-main">
      <div class="auth-card">
        <h1 class="auth-title">Recieve code</h1>
        <p class="auth-subtitle">Code will expire within 30sec</p>

        <form id="loginForm" novalidate>
          <div class="form-group"></div>

          <div class="form-group">
            <label class="form-label" for="password">
              OTP code <span class="required"></span>
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="input-toggle"
                onclick="togglePassword('password', this)"
                aria-label="Toggle password visibility"
              >
                ◉
              </button>
            </div>
          </div>

          <button type="submit" class="btn-auth">Confirm</button>
        </form>

        <p class="auth-footer-text">
          still experiencing isuues?
          <a href="signup.html" class="form-link">try another way</a>
        </p>
      </div>
    </main>
  </body>
</html>
