<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | BetPro</title>
    <meta
      name="description"
      content="Create your BetPro account and start copying top bets from professional players today."
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="auth-header">
      <a href="index.html" class="auth-back">&#8592; Back to Home</a>
      <a href="login.html" class="btn-login">Log In</a>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <a href="index.html" class="auth-logo">
          <div class="logo-icon">◆</div>
          <span class="auth-logo-text">BetPro</span>
        </a>

        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join 50K+ players already earning on BetPro</p>

        <form id="signupForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="fullname">
              Full name <span class="required">*</span>
            </label>
            <input
              type="text"
              id="fullname"
              class="form-input"
              placeholder="John Smith"
              required
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">
              Email address <span class="required">*</span>
            </label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              Password <span class="required">*</span>
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Create a strong password"
                required
                autocomplete="new-password"
                oninput="updateStrength(this.value)"
              />
              <button
                type="button"
                class="input-toggle"
                onclick="togglePassword('password', this)"
                aria-label="Toggle password visibility"
              >
                ◉
              </button>
            </div>
            <div class="password-strength">
              <div class="strength-bar" id="s1"></div>
              <div class="strength-bar" id="s2"></div>
              <div class="strength-bar" id="s3"></div>
              <div class="strength-bar" id="s4"></div>
            </div>
            <p class="hint-text" id="strengthLabel">
              Use 8+ characters with letters, numbers &amp; symbols.
            </p>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">
              Confirm password <span class="required">*</span>
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                id="confirmPassword"
                class="form-input"
                placeholder="Re-enter your password"
                required
                autocomplete="new-password"
              />
              <button
                type="button"
                class="input-toggle"
                onclick="togglePassword('confirmPassword', this)"
                aria-label="Toggle confirm password visibility"
              >
                ◉
              </button>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 22px">
            <label class="form-check">
              <input type="checkbox" id="terms" required />
              I agree to the
              <a href="#" class="form-link">Terms of Service</a>
              and
              <a href="#" class="form-link">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn-auth">
            Create Account — It's Free
          </button>
        </form>

        <p class="auth-footer-text">
          Already have an account?
          <a href="login.html" class="form-link">Sign In</a>
        </p>
      </div>
    </main>

    <script>
      function togglePassword(id, btn) {
        var input = document.getElementById(id);
        var hidden = input.type === "password";
        input.type = hidden ? "text" : "password";
        btn.textContent = hidden ? "🙈" : "👁";
      }

      function updateStrength(val) {
        var bars = ["s1", "s2", "s3", "s4"].map(function (id) {
          return document.getElementById(id);
        });
        var label = document.getElementById("strengthLabel");
        var score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        var colors = ["#ef4444", "#f97316", "#fbbf24", "#10b981"];
        var labels = ["Too weak", "Weak", "Fair", "Strong — great!"];

        bars.forEach(function (bar, i) {
          bar.style.background = i < score ? colors[score - 1] : "#f0f0f0";
        });

        if (val.length === 0) {
          label.textContent =
            "Use 8+ characters with letters, numbers & symbols.";
          label.style.color = "#bbb";
        } else {
          label.textContent = labels[score - 1] || labels[0];
          label.style.color = colors[score - 1] || colors[0];
        }
      }

      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var name = document.getElementById("fullname").value.trim();
          var email = document.getElementById("email").value.trim();
          var pwd = document.getElementById("password").value;
          var cpwd = document.getElementById("confirmPassword").value;
          var terms = document.getElementById("terms").checked;

          if (!name || !email || !pwd || !cpwd) {
            alert("Please fill in all required fields.");
            return;
          }
          if (pwd !== cpwd) {
            alert("Passwords do not match.");
            return;
          }
          if (pwd.length < 8) {
            alert("Password must be at least 8 characters.");
            return;
          }
          if (!terms) {
            alert("Please accept the Terms of Service to continue.");
            return;
          }
          // Simulate successful signup — redirect to dashboard
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
