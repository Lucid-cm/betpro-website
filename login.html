<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | BetPro</title>
    <meta name="description" content="Sign in to your BetPro account and start copying top bets from professional players." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="auth-header">
      <a href="index.html" class="auth-back">← Back to Home</a>
      <a href="signup.html" class="btn-signup">Sign Up Free</a>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <a href="index.html" class="auth-logo">
          <div class="logo-icon">◆</div>
          <span class="auth-logo-text">BetPro</span>
        </a>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue earning with BetPro</p>

        <!-- Social Login -->
        <div class="social-btns">
          <button type="button" class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button type="button" class="social-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>

        <div class="social-divider"><span>or sign in with email</span></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
              <label class="form-label" for="password" style="margin-bottom:0">Password</label>
              <a href="OTP.html" class="form-link" style="font-size:12px;">Forgot password?</a>
            </div>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
              <button type="button" class="input-toggle" onclick="togglePwd('password', this)" aria-label="Toggle password">
                👁
              </button>
            </div>
          </div>

          <div class="form-group" style="margin-bottom:24px;">
            <label class="form-check">
              <input type="checkbox" id="remember" />
              Remember me for 30 days
            </label>
          </div>

          <button type="submit" class="btn-auth">Sign In</button>
        </form>

        <p class="auth-footer-text">
          Don't have an account?
          <a href="signup.html" class="form-link">Create one free</a>
        </p>
      </div>
    </main>

    <script>
      function togglePwd(id, btn) {
        const input = document.getElementById(id);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.textContent = isHidden ? '🙈' : '👁';
      }

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn = this.querySelector('.btn-auth');

        if (!email || !password) {
          showError('Please fill in all fields.');
          return;
        }
        if (password.length < 6) {
          showError('Password must be at least 6 characters.');
          return;
        }

        btn.innerHTML = '<span style="animation:spin 0.8s linear infinite;display:inline-block">⟳</span> Signing in...';
        btn.disabled = true;

        setTimeout(() => {
          window.location.href = 'OTP.html';
        }, 1200);
      });

      function showError(msg) {
        let err = document.querySelector('.form-error');
        if (!err) {
          err = document.createElement('p');
          err.className = 'form-error';
          err.style.cssText = 'color:#ef4444;font-size:13px;font-weight:600;margin-bottom:12px;text-align:center;padding:10px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;';
          document.querySelector('.btn-auth').before(err);
        }
        err.textContent = msg;
      }
    </script>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </body>
</html>
