<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In | BetPro</title>
    <meta
      name="description"
      content="Sign in to your BetPro account and start copying top bets from professional players."
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="auth-header">
      <a href="index.html" class="auth-back">&#8592; Back to Home</a>
      <a href="signup.html" class="btn-signup">Sign Up</a>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <a href="index.html" class="auth-logo">
          <div class="logo-icon">◆</div>
          <span class="auth-logo-text">BetPro</span>
        </a>

        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your BetPro account</p>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">
              Email address <span class="required">*</span>
            </label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              Password <span class="required">*</span>
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="input-toggle"
                onclick="togglePassword('password', this)"
                aria-label="Toggle password visibility"
              >
                ◉
              </button>
            </div>
          </div>

          <div class="form-row">
            <label class="form-check">
              <input type="checkbox" id="remember" />
              Remember me
            </label>
            <a href="#" class="form-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-auth">Sign In</button>
        </form>

        <p class="auth-footer-text">
          Don't have an account?
          <a href="signup.html" class="form-link">Sign Up Free</a>
        </p>
      </div>
    </main>

    <script>
      function togglePassword(id, btn) {
        var input = document.getElementById(id);
        var hidden = input.type === "password";
        input.type = hidden ? "text" : "password";
        btn.textContent = hidden ? "🙈" : "👁";
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var email = document.getElementById("email").value.trim();
          var password = document.getElementById("password").value;
          if (!email || !password) {
            alert("Please fill in all required fields.");
            return;
          }
          // Simulate successful login — redirect to dashboard
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
